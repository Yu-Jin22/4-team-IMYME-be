name: Backend CI/CD

on:
  pull_request:
    branches:
      - dev
      - infra/cicd

  push:
    branches:
      - infra/cicd
      - dev   # dev merge 결과 → CD

permissions:
  actions: write
  contents: read

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
# ==================================================
# CI
# ==================================================
  ci:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v2

      # 2. JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # 3. Gradle Cache
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. gradlew 권한
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. 빌드
      - name: Build
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: ./gradlew build -x test

      # 8.1 이전 아티팩트 삭제
      - name: Delete old artifacts
        if: github.ref == 'refs/heads/infra/cicd' || github.event.pull_request.merged == true
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name === 'backend-dev-latest') {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

      # 8.2 아티팩트 업로드
      - name: Upload artifact
        if: github.ref == 'refs/heads/infra/cicd' || github.event.pull_request.merged == true
        uses: actions/upload-artifact@v4
        with:
          name: backend-dev-latest
          path: build/libs/*.jar
          retention-days: 15
          overwrite: true

  # ---------- CI SUCCESS ----------
  ci-notify-success:
    needs: ci
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Discord CI success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: success
          title: "🟢 Backend CI Success"
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 CI 성공!"
          color: 0x00FF00

  # ---------- CI FAILURE ----------
  ci-notify-failure:
    needs: ci
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord CI failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: failure
          title: "🔴 Backend CI Failed"
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 CI 실패!"
          color: 0xFF0000

# ==================================================
# CD
# ==================================================
  cd:
    needs: ci
    # if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    if: github.event_name == 'push' && github.ref == 'refs/heads/infra/cicd'


    runs-on: ubuntu-latest

    steps:
      # 1️⃣ SSH 세팅
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEV_SERVER_HOST }} >> ~/.ssh/known_hosts

      # 2️⃣ 아티팩트 다운로드
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dev-latest
          path: ./build/libs

      # 3️⃣ 서버 전송
      - name: Copy artifact to dev server
        run: |
          scp -i ~/.ssh/id_rsa ./build/libs/*.jar \
          ubuntu@${{ secrets.DEV_SERVER_HOST }}:/home/ubuntu/mine/backend

      # 4️⃣ 배포
      - name: Deploy to Dev Server
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.DEV_SERVER_HOST }} 'bash -s' <<'EOF'
          set -e
          cd /home/ubuntu/mine/backend

          pkill -f 'java.*jar' || true
          sleep 3

          mkdir -p /home/ubuntu/logs
          export $(cat .env | xargs)

          nohup java -jar mine-0.0.1-SNAPSHOT.jar \

            --spring.profiles.active=dev \
            > /home/ubuntu/logs/backend.log 2>&1 &

          sleep 10
          pgrep -f 'java.*jar'
          EOF

  # ---------- CD SUCCESS ----------
  cd-notify-success:
    needs: cd
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Discord CD success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: success
          title: "🟢 Backend Deploy Success"
          content: "백엔드 개발 서버 배포 완료!"
          color: 0x00FF00

  # ---------- CD FAILURE ----------
  cd-notify-failure:
    needs: cd
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord CD failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: failure
          title: "🔴 Backend Deploy Failed"
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 배포 실패!"
          color: 0xFF0000
