name: Backend CD (v 1.7)

on:
  pull_request:
    types: [closed]
    branches:
      - dev

#
#  push:
#    branches:
#      - infra/cicd

jobs:
  deploy-dev:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ SSH 세팅
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEV_SERVER_HOST }} >> ~/.ssh/known_hosts

      # 2️⃣ SSH 접속 후 배포 (foreground + exit code 전파)
      - name: Deploy to Dev Server
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.DEV_SERVER_HOST }} 'bash -s' <<'EOF'
          set -e

          echo "🚀 Deploy start"

          cd /home/ubuntu/mine/backend/4-team-IMYME-be

          echo "📥 Git sync"
          git fetch origin dev
          git reset --hard origin/dev

          echo "🛠 Build"
          chmod +x gradlew
          ./gradlew build -x test

          echo "🛑 Stop existing process"
          pkill -f 'java.*jar' || true
          sleep 3

          echo "▶ Start backend"
          mkdir -p /home/ubuntu/logs
          export $(cat /home/ubuntu/mine/backend/.env | xargs)

          nohup java -jar build/libs/mine-0.0.1-SNAPSHOT.jar \
            --spring.profiles.active=dev \
            > /home/ubuntu/logs/backend.log 2>&1 &

          sleep 10

          if pgrep -f 'java.*jar' > /dev/null; then
            echo "✅ Backend started successfully"
          else
            echo "❌ Backend failed to start"
            cat /home/ubuntu/logs/backend.log
            exit 1
          fi

          echo "🎉 Deploy finished"
          EOF

  notify-success:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: success()
    steps:
      - name: Discord notification on success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: success
          content: "백엔드 개발서버 배포 완료!"
          title: "🟢 Backend Deploy Success"
          description: |
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **서버:** 43.200.201.50
            **환경:** 🧪 개발서버
          color: 0x00FF00

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: failure()
    steps:
      - name: Discord notification on failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: failure
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 배포 실패!"
          title: "🔴 Backend Deploy Failed"
          description: |
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **서버:** 43.200.201.50
            **에러 로그:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xFF0000
