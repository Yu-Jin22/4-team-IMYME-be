name: Backend CD (v 1.3)

on:
  push:
    branches:
      - infra/cicd

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
              cd /home/ubuntu/mine/backend/4-team-IMYME-be
              git fetch origin dev
              git reset --hard origin/dev
              chmod +x gradlew
              ./gradlew build -x test
              pkill -f 'java.*jar' || true
              mkdir -p /home/ubuntu/logs
              set -a
              source /home/ubuntu/mine/backend/.env
              set +a
              nohup java -jar build/libs/mine-0.0.1-SNAPSHOT.jar --spring.profiles.active=dev > /home/ubuntu/logs/backend.log 2>&1 &
              disown
              sleep 10
              if pgrep -f 'java.*jar' > /dev/null; then
                echo "✅ Backend started successfully"
              else
                echo "❌ Backend failed to start"
                cat /home/ubuntu/logs/backend.log
                exit 1
              fi

  notify-success:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: success()
    steps:
      - name: Discord notification on success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: success
          content: "백엔드 개발서버 배포 완료!"
          title: "🟢 Backend Deploy Success"
          description: |
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **서버:** 43.200.201.50
            **환경:** 🧪 개발서버
          color: 0x00FF00

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: failure()
    steps:
      - name: Discord notification on failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: failure
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 배포 실패!"
          title: "🔴 Backend Deploy Failed"
          description: |
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **서버:** 43.200.201.50
            **에러 로그 보기:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xFF0000
