name: Backend CI

on:
#  pull_request:
#    types: [closed]
#    branches: [dev]
  push:
      branches:
          - infra/cicd

jobs:
  ci:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code # 깃허브 액션이 코드 가져오기
        uses: actions/checkout@v2

      - name: Set up JDK 21 # JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # Gradle 의존성 캐싱 - 빌드 속도 향상용
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          # 캐싱할 폴더들
          path: |
            ~/.gradle/caches      # 다운받은 라이브러리들
            ~/.gradle/wrapper     # Gradle 실행 파일

          # 캐시 키 (build.gradle 바뀌면 새 캐시 생성)
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

          # 정확한 캐시 없으면 비슷한 거라도 가져옴
          restore-keys: |
            ${{ runner.os }}-gradle-

      # gradlew 파일 권한 변경
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ========================================
      # 정적 분석 (Static Analysis)
      # ========================================

      # SpotBugs(버그패턴 캐치) : null위험, 무한 루프 등
      - name: Run SpotBugs
        run: ./gradlew spotbugsMain

      # PMD(좋지 않은 코드 습관 캐치) : 중복코드, 안쓰는 변수 등
      - name: Run PMD
        run: ./gradlew pmdMain

      # Checkstyle(코드 스타일) : 들여쓰기, 네이밍 규칙, 공백 등
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain



      # 빌드
      - name: Build
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: ./gradlew build -x test

      # 테스트
      - name: Run Tests
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: ./gradlew test



      # ========================================
      # 아티팩트 저장 (main 브랜치만)
      # ========================================

      # 이전 아티팩트 삭제
      - name: Delete old artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name === 'backend-latest') {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

      # 빌드 결과 저장
      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-latest
          path: build/libs/*.jar
          retention-days: 90
          overwrite: true

  # ========================================
  # 실패 알림 (Discord)
  # ========================================
  notify-failure:
    runs-on: ubuntu-latest
    needs: ci
    if: failure()
    steps:
      - name: Discord notification on failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: failure
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 CI 실패!"
          title: "🔴 Backend CI Failed"
          description: |
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            **에러 로그 보기:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          color: 0xFF0000
