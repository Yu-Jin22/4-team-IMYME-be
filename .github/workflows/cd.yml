name: Backend CD

on:
#  pull_request:
#    types: [closed]
#    branches: [dev]
  push:
      branches:
          - infra/cicd

jobs:
  # CD - 개발 서버 배포 (dev 브랜치)
  deploy-dev:
    runs-on: ubuntu-latest
#    if: >
#      github.event.workflow_run.conclusion == 'success' &&
#      github.event.workflow_run.head_branch == 'dev'

    steps:
      # 개발 서버 배포 (SSH)
      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            # 백엔드 디렉토리 이동
            cd /home/ubuntu/mine/backend  # 여기 수정

            # 최신 코드 가져오기
            git fetch origin dev
            git reset --hard origin/dev

            # gradlew 실행 권한
            chmod +x gradlew

            # 빌드 (테스트 제외)
            ./gradlew build -x test

            # 기존 프로세스 종료
            pkill -f 'java.*jar' || true

            # 새 버전 실행 (백그라운드)
            nohup java -jar build/libs/*.jar \
              --spring.profiles.active=dev \
              > /home/ubuntu/logs/backend.log 2>&1 &

            # 실행 확인
            sleep 5
            if pgrep -f 'java.*jar' > /dev/null; then
              echo "✅ Backend started successfully"
            else
              echo "❌ Backend failed to start"
              exit 1
            fi

  # ========================================
  # 배포 성공 알림 (Discord)
  # ========================================
  notify-success:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: success()
    steps:
      - name: Discord notification on success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: success
          content: "백엔드 개발서버 배포 완료!"
          title: "🟢 Backend Deploy Success"
          description: |
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **서버:** 43.200.201.50
            **환경:** 🧪 개발서버
          color: 0x00FF00

  # ========================================
  # 배포 실패 알림 (Discord)
  # ========================================
  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: failure()
    steps:
      - name: Discord notification on failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: failure
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 배포 실패!"
          title: "🔴 Backend Deploy Failed"
          description: |
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Commit:** ${{ github.event.workflow_run.head_sha }}
            **서버:** 43.200.201.50
            **에러 로그 보기:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xFF0000
