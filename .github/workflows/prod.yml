name: Backend CI → ECR (Kubernetes Deploy via ArgoCD)

on:
    pull_request:
        branches:
            #- main
            - feat/k8sCI
    push:
        branches:
            #- main
            - feat/k8sCI

permissions:
    contents: read

concurrency:
    group: backend-ci-${{ github.ref }}
    cancel-in-progress: false

jobs:
    ci:
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            rabbitmq:
                image: rabbitmq:3-management
                ports:
                    - 5672:5672
                    - 15672:15672
                env:
                    RABBITMQ_DEFAULT_USER: guest
                    RABBITMQ_DEFAULT_PASS: guest
                options: >-
                    --health-cmd "rabbitmq-diagnostics -q ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 21 (with Gradle cache)
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x ./gradlew

            - name: Run SpotBugs
              run: ./gradlew spotbugsMain

            - name: Run PMD
              run: ./gradlew pmdMain

            - name: Run Checkstyle
              run: ./gradlew checkstyleMain

            - name: Build and Test
              run: ./gradlew build
              env:
                  SPRING_PROFILES_ACTIVE: test
                  SPRING_REDIS_HOST: localhost
                  SPRING_REDIS_PORT: 6379
                  SPRING_RABBITMQ_HOST: localhost
                  SPRING_RABBITMQ_PORT: 5672
                  SPRING_RABBITMQ_USERNAME: guest
                  SPRING_RABBITMQ_PASSWORD: guest

            - name: Upload JAR artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-jar
                  path: build/libs/*.jar
                  retention-days: 1

    image-push:
        needs: ci
        if: github.event_name == 'push' && github.ref == 'refs/heads/feat/k8sCI'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download JAR artifact
              uses: actions/download-artifact@v4
              with:
                  name: app-jar
                  path: build/libs

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ap-northeast-2

            - name: Login to Amazon ECR
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  platforms: linux/arm64
                  tags: |
                      219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-backend:${{ github.sha }}
                      219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-backend:yujin-test-latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    ci-notify-success:
        needs: ci
        if: success()
        runs-on: ubuntu-latest
        steps:
            - name: Discord CI success
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
                  status: success
                  title: "🟢 백엔드 CI 성공"
                  content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 CI 성공!"
                  color: 0x00FF00

    ci-notify-failure:
        needs: ci
        if: failure()
        runs-on: ubuntu-latest
        steps:
            - name: Discord CI failure
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
                  status: failure
                  title: "🔴 백엔드 CI 실패"
                  content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 백엔드 CI 실패!"
                  color: 0xFF0000

    image-push-notify-success:
        needs: image-push
        if: success()
        runs-on: ubuntu-latest
        steps:
            - name: Discord image push success
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
                  status: success
                  title: "🟢 백엔드 이미지 푸시 성공"
                  content: "운영용 백엔드 이미지 ECR 푸시 완료! 이후 배포는 ArgoCD가 수행합니다."
                  color: 0x00FF00

    image-push-notify-failure:
        needs: image-push
        if: failure()
        runs-on: ubuntu-latest
        steps:
            - name: Discord image push failure
              uses: sarisia/actions-status-discord@v1
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
                  status: failure
                  title: "🔴 백엔드 이미지 푸시 실패"
                  content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 운영용 백엔드 이미지 ECR 푸시 실패!"
                  color: 0xFF0000
