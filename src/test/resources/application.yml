spring:
    config:
        activate:
            on-profile: test

    # 1. 가짜 OAuth 설정 (테스트 통과용)
    security:
        oauth2:
            client:
                registration:
                    kakao:
                        client-id: "test-client-id"
                        client-secret: "test-client-secret"
                        redirect-uri: "http://localhost:3000/auth/callback/kakao"
                        authorization-grant-type: authorization_code
                        client-authentication-method: client_secret_post
                        scope:
                            - profile_nickname
                            - profile_image
                            - account_email
                provider:
                    kakao:
                        authorization-uri: https://kauth.kakao.com/oauth/authorize
                        token-uri: https://kauth.kakao.com/oauth/token
                        user-info-uri: https://kapi.kakao.com/v2/user/me
                        user-name-attribute: id

    # 2. 가짜 DB 설정 (H2 메모리 DB)
    datasource:
        url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driver-class-name: org.h2.Driver
        username: sa
        password:
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: create-drop
        properties:
            hibernate:
                format_sql: true
                show_sql: true

# 3. 가짜 JWT 설정 (Assert 에러 해결 핵심!)
jwt:
    secret: "this-is-a-very-long-dummy-secret-key-for-test-environment-only-minimum-32-bytes"
    access-token-expiration: 3600000
    refresh-token-expiration: 1209600000
