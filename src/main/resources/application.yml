spring:
    config:
        # .env 파일을 불러오는 설정
        import: optional:file:.env[.yaml]

    application:
        name: mine

    # JSON 날짜 포맷 설정 (배열 대신 문자열로 반환)
    jackson:
        serialization:
            write-dates-as-timestamps: false
        time-zone: Asia/Seoul

    # 파일 업로드 용량 설정 (기본 1MB -> 20MB)
    servlet:
        multipart:
            max-file-size: 20MB
            max-request-size: 20MB

    mvc:
        throw-exception-if-no-handler-found: true
        path match:
            matching-strategy: ant_path_matcher
    web:
        resources:
            add-mappings: false

    # ==================================================
    # DB (PostgreSQL)
    # ==================================================
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    flyway:
        enabled: true
        # 기존에 Flyway 없이 만든 테이블이 있어도 에러 내지 않고 히스토리 테이블 생성
        baseline-on-migrate: true
        # 마이그레이션 스크립트 위치 (기본값이라 생략 가능하지만 명시함)
        locations: classpath:db/migration

    # ==================================================
    # JPA / Hibernate
    # ==================================================
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                format_sql: true
        open-in-view: false

    # ==================================================
    # Security OAuth2 (카카오 로그인)
    # ==================================================
    security:
        oauth2:
            client:
                registration:
                    kakao:
                        client-id: ${KAKAO_CLIENT_ID}
                        client-secret: ${KAKAO_CLIENT_SECRET}
                        redirect-uri: ${KAKAO_REDIRECT_URI}
                        authorization-grant-type: authorization_code
                        client-authentication-method: client_secret_post
                        scope:
                            - profile_nickname
                            - profile_image
                            - account_email
                provider:
                    kakao:
                        authorization-uri: https://kauth.kakao.com/oauth/authorize
                        token-uri: https://kauth.kakao.com/oauth/token
                        user-info-uri: https://kapi.kakao.com/v2/user/me
                        user-name-attribute: id

# ==================================================
# AWS S3 설정
# ==================================================
cloud:
    aws:
        credentials:
            access-key: ${S3_ACCESS_KEY}
            secret-key: ${S3_SECRET_KEY}
        region:
            static: ${AWS_REGION}
        s3:
            bucket: ${BUCKET_NAME}

# ==================================================
# AI 서버 설정
# ==================================================
ai-server:
    base-url: ${AI_SERVER_URL}
    secret: ${AI_SERVER_SECRET}
    timeout-seconds: 30

# ==================================================
# Knowledge 배치 작업 설정
# ==================================================
knowledge:
    batch:
        # 배치 작업 활성화 여부 (false로 설정하면 스케줄러 실행 안 됨)
        enabled: false
        # 한 번에 처리할 피드백 배치 크기 (AI 서버 제한: 최대 100개)
        batch-size: 50
        # 키워드 간 처리 지연 시간 (밀리초) - AI 서버 부하 방지
        keyword-delay-ms: 1000
        # 배치 간 처리 지연 시간 (밀리초) - OpenAI API rate limit 방지
        batch-delay-ms: 2000
        # 활성화된 키워드 ID 목록 (빈 리스트면 모든 키워드 처리)
        enabled-keywords: []
        # 유사도 검색 시 가져올 최대 개수 (AI 서버 제한: 최대 10개)
        max-similar-count: 5
        # 유사도 임계값 (0.0 ~ 1.0) - 이 값보다 높은 유사도를 가진 지식만 가져옴
        similarity-threshold: 0.7

# ==================================================
# 서버 설정
# ==================================================
server:
    port: 8080
    servlet:
        encoding:
            charset: UTF-8
            force: true

# ==================================================
# 로그 설정
# ==================================================
logging:
    level:
        com.imyme.mine: DEBUG
        org.springframework.security: INFO
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql.BasicBinder: TRACE # 바인딩 변수 보려면 TRACE 권장
        org.hibernate.type: INFO # 너무 시끄러운 로그 방지
        org.flywaydb: INFO
    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# ==================================================
# JWT 설정
# ==================================================
jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 3600000    # 1시간
    refresh-token-expiration: 604800000 # 7일

# ==================================================
# CORS 설정
# ==================================================
cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

# ==================================================
# Swagger 설정
# ==================================================
springdoc:
    swagger-ui:
        path: /swagger-ui.html
        tags-sorter: alpha
        groups-order: DESC
        operations-sorter: method # 메소드 순 정렬 (GET -> POST -> PUT)
        disable-swagger-default-url: true
        display-request-duration: true # 요청 소요 시간 표시
    api-docs:
        path: /v3/api-docs
    show-actuator: true
    default-consumes-media-type: application/json
    default-produces-media-type: application/json

# ==================================================
# Actuator & Prometheus 설정
# ==================================================
management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus,metrics
            base-path: /actuator
    endpoint:
        health:
            show-details: always
        prometheus:
            enabled: true
    metrics:
        export:
            prometheus:
                enabled: true
        tags:
            application: ${spring.application.name}
