spring:
    config:
        activate:
            on-profile: release # 'release' 프로필일 때 활성화 (사전 프로덕션)

    flyway:
        locations: classpath:db/migration
        # Release는 실제 데이터 사용, testdata 제외

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false      # 운영과 동일하게 쿼리 로그 끔
        open-in-view: false

    # Release 환경 카카오 OAuth 설정
    security:
        oauth2:
            client:
                registration:
                    kakao:
                        redirect-uri: ${FRONTEND_URL_RELEASE}/auth/callback/kakao

    # Release 환경 Redis 설정
    # ElastiCache: TLS ON, ACL 사용 (Prod와 동일한 보안 수준)
    data:
        redis:
            host: ${REDIS_HOST}
            port: ${REDIS_PORT:6379}
            password: ${REDIS_PASSWORD}  # AWS Secrets Manager 또는 환경변수
            ssl:
                enabled: true  # TLS 활성화 (Prod와 동일)
            timeout: 5000ms
            lettuce:
                pool:
                    max-active: 15  # Prod(20)보다는 작게
                    max-idle: 8
                    min-idle: 3
                    max-wait: 5000ms

    # Release 환경 RabbitMQ 설정
    # Amazon MQ for RabbitMQ: TLS ON (Prod 검증용)
    rabbitmq:
        # Amazon MQ 엔드포인트 (예: b-xxx-xxx.mq.ap-northeast-2.amazonaws.com)
        host: ${RABBITMQ_HOST}
        port: ${RABBITMQ_PORT:5671}  # TLS 포트 (amqps://)
        username: ${RABBITMQ_USER}
        password: ${RABBITMQ_PASSWORD}  # AWS Secrets Manager에서 주입
        ssl:
            enabled: true  # TLS 필수
            algorithm: TLSv1.2  # 최소 TLS 버전
        connection-timeout: 10000ms
        requested-heartbeat: 30  # 연결 유지 확인 (초)
        listener:
            simple:
                acknowledge-mode: manual
                prefetch: 3  # Release는 Prod보다 낮은 동시 처리 수
                concurrency: 2  # 최소 Consumer 수
                max-concurrency: 5  # 최대 Consumer 수
                retry:
                    enabled: true
                    initial-interval: 3000ms
                    max-attempts: 3
                    multiplier: 2.0
                    max-interval: 10000ms

logging:
    level:
        root: INFO
        com.imyme.mine: DEBUG  # Prod보다는 상세한 로그 (디버깅용)
        org.springframework.security: INFO
        org.hibernate.SQL: WARN

# Release 환경에서 배치 작업 설정 (Prod 검증용)
knowledge:
    batch:
        enabled: false  # 필요 시 true로 변경

# Sentry 설정 (운영 환경용)
sentry:
    environment: release
    debug: false  # debug 로그 끔
    traces-sample-rate: 0.1  # 10% 샘플링 (비용 절감)