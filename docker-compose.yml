version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: mine-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - mine-network

  postgres:
    image: postgres:15-alpine
    container_name: mine-postgres
    environment:
      POSTGRES_DB: mine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - mine-network

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  mine-network:
    driver: bridge