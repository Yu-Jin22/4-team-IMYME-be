version: '3.8'

services:
  # ==========================================
  # Pinpoint Stack (APM)
  # ==========================================

  # Pinpoint HBase - 데이터 저장소
  pinpoint-hbase:
    image: pinpointdocker/pinpoint-hbase:3.0.0
    container_name: imyme-pinpoint-hbase
    networks:
      - monitoring
    environment:
      - HBASE_ZOOKEEPER_QUORUM=pinpoint-hbase
    volumes:
      - hbase-data:/home/pinpoint/hbase
      - zookeeper-data:/home/pinpoint/zookeeper
    restart: unless-stopped

  # Pinpoint Collector - Agent로부터 데이터 수집
  pinpoint-collector:
    image: pinpointdocker/pinpoint-collector:3.0.0
    container_name: imyme-pinpoint-collector
    depends_on:
      - pinpoint-hbase
    networks:
      - monitoring
    ports:
      - "9991:9991"   # TCP (agent)
      - "9992:9992"   # TCP (agent)
      - "9993:9993"   # TCP (agent)
      - "9994:9994/tcp"  # TCP (agent)
      - "9994:9994/udp"  # UDP (agent - stat)
      - "9995:9995/tcp"  # TCP (agent)
      - "9995:9995/udp"  # UDP (agent - span)
      - "9996:9996/udp"  # UDP (agent)
    environment:
      - CLUSTER_ENABLE=false
      - HBASE_HOST=pinpoint-hbase
      - HBASE_PORT=2181
      - CLUSTER_ZOOKEEPER_ADDRESS=pinpoint-hbase
    restart: unless-stopped

  # Pinpoint Web - UI 대시보드
  pinpoint-web:
    image: pinpointdocker/pinpoint-web:3.0.0
    container_name: imyme-pinpoint-web
    depends_on:
      - pinpoint-hbase
      - pinpoint-collector
    networks:
      - monitoring
    ports:
      - "8079:8080"  # ⚠️ 8080 포트 충돌 방지: 8079로 매핑
    environment:
      - CLUSTER_ENABLE=false
      - HBASE_HOST=pinpoint-hbase
      - HBASE_PORT=2181
      - ADMIN_PASSWORD=admin
      - CLUSTER_ZOOKEEPER_ADDRESS=pinpoint-hbase
      - SPRING_PROFILES_ACTIVE=release
    restart: unless-stopped

  # ==========================================
  # Prometheus + Grafana Stack (메트릭)
  # ==========================================

  # Prometheus - Spring Boot 메트릭 수집
  prometheus:
    image: prom/prometheus:latest
    container_name: imyme-prometheus
    ports:
      - "9092:9090"  # 9090 대신 9092 사용 (충돌 방지)
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Grafana - 통합 시각화 대시보드
  grafana:
    image: grafana/grafana:latest
    container_name: imyme-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  hbase-data:
  zookeeper-data:
  prometheus-data:
  grafana-data: