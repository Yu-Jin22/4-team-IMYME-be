version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: mine-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    restart: unless-stopped
    networks:
      - mine-dev-network

  postgres:
    image: postgres:15-alpine
    container_name: mine-postgres-dev
    environment:
      POSTGRES_DB: mine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - mine-dev-network

volumes:
  redis-dev-data:
    driver: local
  postgres-dev-data:
    driver: local

networks:
  mine-dev-network:
    driver: bridge